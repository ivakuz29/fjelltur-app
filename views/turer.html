<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fjelltur &mdash; Mine turer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/css/style.css?v=20260422-10">
</head>
<body>

  <div id="lightbox">
    <button type="button" class="lightbox-nav lightbox-prev" id="lightbox-prev">&#8249;</button>
    <img id="lightbox-bilde" src="" alt="Fullbilde">
    <button type="button" class="lightbox-nav lightbox-next" id="lightbox-next">&#8250;</button>
    <span class="lightbox-counter" id="lightbox-counter"></span>
  </div>

  <div id="sidebar-backdrop" class="sidebar-backdrop"></div>

  <header class="app-header">
    <div class="app-brand">Fjell<em>tur</em></div>
    <div class="app-user">
      <span class="app-username">&mdash; <span id="nav-bruker"></span></span>
      <button type="button" class="btn-logout" id="logout-btn">Logg ut</button>
    </div>
  </header>

  <div class="app-body">
    <aside class="form-sidebar" id="form-sidebar">
      <div class="sidebar-head">
        <h2 class="sidebar-title" id="skjema-tittel">Ny tur</h2>
        <button type="button" class="sidebar-close-btn" id="sidebar-close-btn" aria-label="Lukk">&#215;</button>
      </div>

      <div id="bilde-seksjon">
        <p class="bilde-seksjon-tittel">Bilder</p>
        <div id="eksisterende-bilder" class="bilde-grid"></div>

        <div class="drop-zone" id="drop-zone">
          <input type="file" id="bilde-input" multiple accept="image/*">
          <svg class="drop-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 16.5V9.75m0 0-3 3m3-3 3 3M6.75 19.5a4.5 4.5 0 0 1-1.41-8.775 5.25 5.25 0 0 1 10.338-2.32 5.75 5.75 0 0 1 1.232 11.095H6.75Z"/>
          </svg>
          <p class="drop-primary">Slipp bilder her</p>
          <p class="drop-secondary">eller klikk for &aring; velge</p>
          <p class="drop-formats">JPG &middot; PNG &middot; WebP</p>
          <p class="drop-count" id="drop-count"></p>
        </div>
        <button type="button" id="last-opp-btn" class="btn btn-primary drop-upload-btn">Last opp</button>
        <div class="bilde-seksjon-divider"></div>
      </div>

      <form id="tur-form">
        <input type="hidden" id="rediger-id">

        <div class="field">
          <label>Fjell *</label>
          <input type="text" id="fjell" placeholder="f.eks. Galdh&oslash;piggen" required>
        </div>

        <div class="field">
          <label>Dato *</label>
          <input type="date" id="dato" required>
        </div>

        <div class="field">
          <label>Distanse (km)</label>
          <input type="text" id="distanse" placeholder="f.eks. 12,5 km" inputmode="decimal" autocomplete="off">
        </div>

        <div class="field">
          <label>H&oslash;yde (moh) *</label>
          <input type="text" id="hoyde" placeholder="f.eks. 2469 moh" inputmode="numeric" autocomplete="off" required>
        </div>

        <div class="field">
          <label>Notat</label>
          <textarea id="notat" placeholder="Skriv noe om turen..."></textarea>
        </div>

        <div class="field field-toggle">
          <label class="toggle-label">
            <input type="checkbox" id="offentlig" class="toggle-input">
            <span class="toggle-track"></span>
            <span class="toggle-text">Offentlig tur</span>
          </label>
          <p class="field-hint">Offentlige turer kan f&aring; kommentarer fra andre.</p>
        </div>

        <div class="field">
          <label>Deltakere</label>
          <div id="staged-deltakere" class="staged-deltakere"></div>
          <input type="text" id="deltaker-input" class="deltaker-search-input" placeholder="S&oslash;k etter bruker..." autocomplete="off">
          <div id="deltaker-resultater" class="participant-results"></div>
        </div>

        <div class="form-actions">
          <button type="submit" id="lagre-btn" class="btn btn-primary">Lagre</button>
          <button type="button" id="avbryt-btn" class="btn btn-ghost" style="display:none">Avbryt</button>
        </div>
        <p class="skjema-melding" id="skjema-melding"></p>
      </form>
    </aside>

    <section class="log-panel">
      <div class="log-header">
        <div class="log-header-left">
          <h1>Mine turer</h1>
          <span class="log-count" id="tur-count"></span>
        </div>
        <button type="button" class="btn btn-primary btn-ny-tur" id="ny-tur-btn">+ Ny tur</button>
      </div>

      <div id="tur-liste"></div>
    </section>
  </div>

  <script src="/js/pages/trips.js?v=20260422-10" defer></script>
</body>
</html>
