<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fjelltur — Mine turer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <!-- Lightbox -->
  <div id="lightbox" onclick="lukkLightbox()">
    <img id="lightbox-bilde" src="" alt="Fullbilde">
  </div>

  <!-- Top bar -->
  <header class="app-header">
    <div class="app-brand">Fjell<em>tur</em></div>
    <div class="app-user">
      <span class="app-username">— <span id="nav-bruker"></span></span>
      <button class="btn-logout" onclick="loggUt()">Logg ut</button>
    </div>
  </header>

  <div class="app-body">

    <!-- Left: Add / edit form -->
    <aside class="form-sidebar">
      <h2 class="sidebar-title" id="skjema-tittel">Ny tur</h2>

      <form id="tur-form">
        <input type="hidden" id="rediger-id">

        <div class="field">
          <label>Fjell *</label>
          <input type="text" id="fjell" placeholder="f.eks. Galdhøpiggen" required>
        </div>

        <div class="field">
          <label>Dato *</label>
          <input type="date" id="dato" required>
        </div>

        <div class="field">
          <label>Distanse (km)</label>
          <input type="number" id="distanse" placeholder="f.eks. 12.5" step="0.1" min="0">
        </div>

        <div class="field">
          <label>Notat</label>
          <textarea id="notat" placeholder="Skriv noe om turen..."></textarea>
        </div>

        <div class="form-actions">
          <button type="submit" id="lagre-btn" class="btn btn-primary">Lagre</button>
          <button type="button" id="avbryt-btn" class="btn btn-ghost" onclick="avbrytRediger()" style="display:none">Avbryt</button>
        </div>
      </form>

      <!-- Bildeopplasting — vises kun ved redigering -->
      <div id="bilde-seksjon" style="display:none">
        <div class="bilde-seksjon-divider"></div>
        <p class="bilde-seksjon-tittel">Bilder</p>
        <div id="eksisterende-bilder" class="bilde-grid"></div>
        <div class="bilde-last-opp">
          <input type="file" id="bilde-input" multiple accept="image/*">
          <button type="button" id="last-opp-btn" class="btn btn-ghost btn-sm" onclick="lastOppBilder()">Last opp</button>
        </div>
      </div>
    </aside>

    <!-- Right: Log entries -->
    <section class="log-panel">
      <div class="log-header">
        <h1>Mine turer</h1>
        <span class="log-count" id="tur-count"></span>
      </div>

      <div id="tur-liste"></div>
    </section>
  </div>

  <script>
    let turer = [];
    let aktivTurId = null;

    window.addEventListener('load', async () => {
      const svar = await fetch('/api/meg');
      const data = await svar.json();
      if (!data.ok) { window.location.href = '/'; return; }
      document.getElementById('nav-bruker').textContent = data.bruker.brukernavn;
      lastTurer();
    });

    async function lastTurer() {
      const svar = await fetch('/api/turer');
      turer = await svar.json();
      const liste = document.getElementById('tur-liste');
      const count = document.getElementById('tur-count');

      if (turer.length === 0) {
        count.textContent = '';
        liste.innerHTML = `
          <div class="empty-state">
            <span class="empty-icon">∧</span>
            <p>Ingen turer registrert enda</p>
          </div>`;
        return;
      }

      count.textContent = turer.length + ' ' + (turer.length === 1 ? 'tur' : 'turer');

      liste.innerHTML = turer.map((tur, i) => {
        const nr = String(turer.length - i).padStart(3, '0');
        const bildeHtml = tur.bilder && tur.bilder.length > 0
          ? `<div class="tur-bilder">${tur.bilder.map(b =>
              `<img src="/uploads/${b.filnavn}" alt="Bilde" onclick="aapneLightbox('/uploads/${b.filnavn}')">`
            ).join('')}</div>`
          : '';
        return `
          <div class="tur-entry">
            <div class="tur-entry-top">
              <span class="tur-num">#${nr}</span>
              <span class="tur-date">${tur.dato}</span>
            </div>
            <h3 class="tur-name">${tur.fjell}</h3>
            <div class="tur-meta">
              ${tur.distanse ? `<span class="tur-distance">${tur.distanse} km</span>` : ''}
            </div>
            ${tur.notat ? `<p class="tur-note">${tur.notat}</p>` : ''}
            ${bildeHtml}
            <div class="tur-actions">
              <button class="btn btn-edit" onclick="startRediger(${tur.id})">Rediger</button>
              <button class="btn btn-danger" onclick="slettTur(${tur.id})">Slett</button>
            </div>
          </div>`;
      }).join('');

      // Oppdater bildeseksjonen i sidebar hvis vi er i redigeringsmodus
      if (aktivTurId !== null) {
        const tur = turer.find(t => t.id === aktivTurId);
        if (tur) oppdaterBildeSeksjon(tur.bilder || []);
      }
    }

    document.getElementById('tur-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('rediger-id').value;
      const data = {
        fjell: document.getElementById('fjell').value,
        dato: document.getElementById('dato').value,
        distanse: document.getElementById('distanse').value,
        notat: document.getElementById('notat').value
      };

      let svar;
      if (id) {
        svar = await fetch('/api/turer/' + id, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
      } else {
        svar = await fetch('/api/turer', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
      }

      const result = await svar.json();
      if (result.ok) {
        if (!id) {
          // Ny tur: gå inn i redigeringsmodus for å kunne laste opp bilder
          aktivTurId = result.id;
          await lastTurer();
          const tur = turer.find(t => t.id === result.id);
          if (tur) {
            document.getElementById('rediger-id').value = result.id;
            document.getElementById('fjell').value = tur.fjell;
            document.getElementById('dato').value = tur.dato;
            document.getElementById('distanse').value = tur.distanse || '';
            document.getElementById('notat').value = tur.notat || '';
            document.getElementById('skjema-tittel').textContent = 'Rediger tur';
            document.getElementById('lagre-btn').textContent = 'Oppdater';
            document.getElementById('avbryt-btn').style.display = 'inline-block';
            oppdaterBildeSeksjon([]);
          }
        } else {
          await lastTurer();
        }
      }
    });

    function startRediger(id) {
      aktivTurId = id;
      const tur = turer.find(t => t.id === id);
      document.getElementById('rediger-id').value = id;
      document.getElementById('fjell').value = tur.fjell;
      document.getElementById('dato').value = tur.dato;
      document.getElementById('distanse').value = tur.distanse || '';
      document.getElementById('notat').value = tur.notat || '';
      document.getElementById('skjema-tittel').textContent = 'Rediger tur';
      document.getElementById('lagre-btn').textContent = 'Oppdater';
      document.getElementById('avbryt-btn').style.display = 'inline-block';
      oppdaterBildeSeksjon(tur.bilder || []);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function oppdaterBildeSeksjon(bilder) {
      const seksjon = document.getElementById('bilde-seksjon');
      const grid = document.getElementById('eksisterende-bilder');
      seksjon.style.display = 'block';

      if (bilder.length === 0) {
        grid.innerHTML = '<p class="ingen-bilder">Ingen bilder ennå</p>';
      } else {
        grid.innerHTML = bilder.map(b => `
          <div class="bilde-thumbnail">
            <img src="/uploads/${b.filnavn}" alt="Bilde" onclick="aapneLightbox('/uploads/${b.filnavn}')">
            <button class="bilde-slett" onclick="slettBilde(${aktivTurId}, ${b.id})" title="Slett bilde">×</button>
          </div>`).join('');
      }
    }

    function avbrytRediger() {
      aktivTurId = null;
      document.getElementById('tur-form').reset();
      document.getElementById('rediger-id').value = '';
      document.getElementById('skjema-tittel').textContent = 'Ny tur';
      document.getElementById('lagre-btn').textContent = 'Lagre';
      document.getElementById('avbryt-btn').style.display = 'none';
      document.getElementById('bilde-seksjon').style.display = 'none';
      document.getElementById('eksisterende-bilder').innerHTML = '';
    }

    async function lastOppBilder() {
      const input = document.getElementById('bilde-input');
      if (!input.files.length) return;

      const fd = new FormData();
      for (const fil of input.files) fd.append('bilder', fil);

      const btn = document.getElementById('last-opp-btn');
      btn.disabled = true;
      btn.textContent = 'Laster opp...';

      await fetch(`/api/turer/${aktivTurId}/bilder`, { method: 'POST', body: fd });

      input.value = '';
      btn.disabled = false;
      btn.textContent = 'Last opp';

      await lastTurer();
    }

    async function slettBilde(turId, bildeId) {
      if (!confirm('Slett dette bildet?')) return;
      await fetch(`/api/turer/${turId}/bilder/${bildeId}`, { method: 'DELETE' });
      await lastTurer();
    }

    async function slettTur(id) {
      if (!confirm('Slett denne turen?')) return;
      const svar = await fetch('/api/turer/' + id, { method: 'DELETE' });
      const data = await svar.json();
      if (data.ok) {
        if (aktivTurId === id) avbrytRediger();
        lastTurer();
      }
    }

    function aapneLightbox(src) {
      document.getElementById('lightbox-bilde').src = src;
      document.getElementById('lightbox').style.display = 'flex';
    }

    function lukkLightbox() {
      document.getElementById('lightbox').style.display = 'none';
      document.getElementById('lightbox-bilde').src = '';
    }

    async function loggUt() {
      await fetch('/api/logout', { method: 'POST' });
      window.location.href = '/';
    }
  </script>
</body>
</html>
